services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emailservice-backend
    restart: unless-stopped
    environment:
      PORT: 4000
      NODE_ENV: production
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://emailservice-frontend:3000}
      # MongoDB
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB_NAME: ${MONGO_DB_NAME:-placement_erp}
      MONGO_IMPORTER_DB: ${MONGO_IMPORTER_DB:-db_importer}
      # PostgreSQL (importer)
      DATABASE_URL: ${DB_IMPORTER_DATABASE_URL:-}
      # Redis
      REDIS_URL: redis://redis:6379
      # Kafka
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:-placement-erp-backend}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-redpanda:9092}
      KAFKA_PENDING_TOPIC: ${KAFKA_PENDING_TOPIC:-job.notification.pending}
      KAFKA_SEND_TOPIC: ${KAFKA_SEND_TOPIC:-job.notification.send}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-placement-approval-group}
      KAFKA_EMAIL_CONSUMER_GROUP: ${KAFKA_EMAIL_CONSUMER_GROUP:-placement-email-consumer-group}
      # Email consumer
      EMAIL_CONSUMER_ENABLED: ${EMAIL_CONSUMER_ENABLED:-true}
      ZEPTOMAIL_API_URL: ${ZEPTOMAIL_API_URL:-https://api.zeptomail.in/v1.1/email}
      ZEPTOMAIL_TOKEN: ${ZEPTOMAIL_TOKEN}
      FROM_EMAIL: ${FROM_EMAIL}
      FROM_NAME: ${FROM_NAME:-Placement Cell}
      # Object storage
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-placement-erp-assets}
      OBJECT_STORAGE_USE_SSL: ${OBJECT_STORAGE_USE_SSL:-true}
      OBJECT_STORAGE_AUTO_CREATE_BUCKET: ${OBJECT_STORAGE_AUTO_CREATE_BUCKET:-false}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    ports:
      - "${BACKEND_HOST_PORT:-4400}:4000"
    networks:
      - erp-core-net
      - redis-core-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://134.209.159.132:4400}
        DB_IMPORTER_URL: ${DB_IMPORTER_URL:-http://emailservice-backend:4000}
    container_name: emailservice-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://134.209.159.132:4400}
      DB_IMPORTER_URL: ${DB_IMPORTER_URL:-http://emailservice-backend:4000}
      PORT: 3000
    ports:
      - "${FRONTEND_HOST_PORT:-3300}:3000"
    networks:
      - erp-core-net
      - redis-core-network

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: unless-stopped
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${METABASE_DB_NAME:-metabase}
      MB_DB_PORT: ${METABASE_DB_PORT:-5432}
      MB_DB_USER: ${METABASE_DB_USER:-admin}
      MB_DB_PASS: ${METABASE_DB_PASS}
      MB_DB_HOST: ${METABASE_DB_HOST:-172.17.0.1}
    ports:
      - "8765:3000"
    volumes:
      - metabase-data:/metabase-data
    networks:
      - erp-core-net

volumes:
  metabase-data:

networks:
  erp-core-net:
    external: true
    name: erp-core-net

  redis-core-network:
    external: true
    name: redis-core-network
