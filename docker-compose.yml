services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emailservice-backend
    restart: unless-stopped
    depends_on:
      - minio

    environment:
      PORT: 4000

      # Mongo
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB_NAME: placement_erp

      # Redis
      REDIS_URL: redis://redis:6379

      # Kafka
      KAFKA_CLIENT_ID: placement-approval-service
      KAFKA_BROKERS: redpanda:9092
      KAFKA_CONSUMER_GROUP: placement-approval-group
      KAFKA_PENDING_TOPIC: job.notification.pending
      KAFKA_SEND_TOPIC: job.notification.send

      # MinIO
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: email-bodies

    ports:
      - "${BACKEND_HOST_PORT:-4400}:4000"

    networks:
      - erp-core-net
      - redis-core-network

  excel-backend:
    build:
      context: ./excel-service
      dockerfile: Dockerfile
    container_name: emailservice-excel-backend
    restart: unless-stopped
    depends_on:
      - minio
    environment:
      PORT: 4001
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB_NAME: placement_erp
      KAFKA_CLIENT_ID: excel-service
      KAFKA_BROKERS: redpanda:9092
      KAFKA_CONSUMER_GROUP: excel-service-group
      EXCEL_PROCESS_TOPIC: excel.job.process
      EXCEL_RESULT_TOPIC: excel.job.result
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: email-bodies
      EXCEL_ADMIN_API_KEY: ${EXCEL_ADMIN_API_KEY:-change-me}
      EXCEL_MAX_UPLOAD_BYTES: ${EXCEL_MAX_UPLOAD_BYTES:-5242880}
      EXCEL_MAX_ROWS: ${EXCEL_MAX_ROWS:-5000}
      EXCEL_MAX_ATTEMPTS: ${EXCEL_MAX_ATTEMPTS:-3}
      EXCEL_JOB_RETENTION_DAYS: ${EXCEL_JOB_RETENTION_DAYS:-7}
      EXCEL_CLEANUP_INTERVAL_MS: ${EXCEL_CLEANUP_INTERVAL_MS:-3600000}
      EXCEL_DELETE_IMPORTED_DATA_ON_CLEANUP: ${EXCEL_DELETE_IMPORTED_DATA_ON_CLEANUP:-false}
      EXCEL_UPLOAD_RATE_WINDOW_MS: ${EXCEL_UPLOAD_RATE_WINDOW_MS:-60000}
      EXCEL_UPLOAD_RATE_MAX: ${EXCEL_UPLOAD_RATE_MAX:-2}
      EXCEL_FAILED_PREVIEW_LIMIT: ${EXCEL_FAILED_PREVIEW_LIMIT:-5}
      EXCEL_UPLOAD_DIR: /app/src/excel/uploads
    ports:
      - "${EXCEL_BACKEND_HOST_PORT:-4500}:4001"
    volumes:
      - excel-upload-data:/app/src/excel/uploads
    networks:
      - erp-core-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://134.209.159.132:4400}
    container_name: emailservice-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://134.209.159.132:4400}
      PORT: 3000
    ports:
      - "${FRONTEND_HOST_PORT:-3300}:3000"
    networks:
      - erp-core-net
      - redis-core-network

  email-consumer:
    build:
      context: ./email-consumer
      dockerfile: Dockerfile
    container_name: emailservice-email-consumer
    restart: unless-stopped
    depends_on:
      - minio
    environment:
      KAFKA_CLIENT_ID: email-consumer
      KAFKA_BROKERS: redpanda:9092
      KAFKA_CONSUMER_GROUP: email-consumer-group
      KAFKA_SEND_TOPIC: job.notification.send

      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: email-bodies

      ZEPTOMAIL_API_URL: https://api.zeptomail.in/v1.1/email
      ZEPTOMAIL_TOKEN: Zoho-enczapikey PHtE6r0LF+nsj2Yv+0ACt/K/EMb3NYoprOgyKAlOtYhEC6BRHU0BqNoixDCy+kgoA6FCEPHJyI0+s7+V57qAJ2ruZmZLXGqyqK3sx/VYSPOZsbq6x00at1weckXYVo7td9Jp0yTTstmX
      FROM_EMAIL: "noreply@sumantheluri.tech"
      FROM_NAME: Placement Cell

    networks:
      - erp-core-net
      - redis-core-network

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: unless-stopped
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: admin
      MB_DB_PASS: sumanth123
      MB_DB_HOST: 172.17.0.1
    ports:
      - "8765:3000"
    volumes:
      - metabase-data:/metabase-data
    networks:
      - erp-core-net

  minio:
    image: minio/minio:latest
    container_name: emailservice-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - erp-core-net
      - redis-core-network


volumes:
  excel-upload-data:
  minio-data:
  metabase-data:



networks:
  erp-core-net:
    external: true
    name: erp-core-net

  redis-core-network:
    external: true
    name: redis-core-network
