name: Build & Deploy to K3s

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-k3s-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/emailservice-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/emailservice-frontend

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      sha_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "sha_tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      # ── Backend ──────────────────────────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.sha_tag }}
            ${{ env.BACKEND_IMAGE }}:latest

      # ── Frontend ─────────────────────────────────────────────────────────────
      # VITE_API_URL is baked into the image at build time.
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            DB_IMPORTER_URL=http://backend.erp.svc.cluster.local:4000
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.sha_tag }}
            ${{ env.FRONTEND_IMAGE }}:latest

  deploy:
    name: Deploy to K3s
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Ensure namespace exists
        run: kubectl apply -f k8s/00-namespace.yaml

      # ── Kubernetes secrets (created imperatively from GitHub secrets) ─────────
      - name: Create / update backend-secret
        run: |
          kubectl create secret generic backend-secret \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=ZEPTOMAIL_TOKEN="${{ secrets.ZEPTOMAIL_TOKEN }}" \
            --from-literal=FROM_EMAIL="${{ secrets.FROM_EMAIL }}" \
            --from-literal=OBJECT_STORAGE_ENDPOINT="${{ secrets.OBJECT_STORAGE_ENDPOINT }}" \
            --from-literal=OBJECT_STORAGE_ACCESS_KEY="${{ secrets.OBJECT_STORAGE_ACCESS_KEY }}" \
            --from-literal=OBJECT_STORAGE_SECRET_KEY="${{ secrets.OBJECT_STORAGE_SECRET_KEY }}" \
            --namespace erp \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create / update metabase-secret
        run: |
          kubectl create secret generic metabase-secret \
            --from-literal=MB_DB_PASS="${{ secrets.METABASE_DB_PASS }}" \
            --namespace erp \
            --dry-run=client -o yaml | kubectl apply -f -

      # ── Templated manifests (domain names injected via envsubst) ─────────────
      - name: Apply templated manifests
        env:
          LETSENCRYPT_EMAIL: ${{ vars.LETSENCRYPT_EMAIL }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
          BACKEND_DOMAIN: ${{ vars.BACKEND_DOMAIN }}
          FRONTEND_DOMAIN: ${{ vars.FRONTEND_DOMAIN }}
          METABASE_DOMAIN: ${{ vars.METABASE_DOMAIN }}
        run: |
          envsubst < k8s/01-cluster-issuer.yaml       | kubectl apply -f -
          envsubst < k8s/backend/configmap.yaml        | kubectl apply -f -
          envsubst < k8s/backend/ingress.yaml          | kubectl apply -f -
          envsubst < k8s/frontend/ingress.yaml         | kubectl apply -f -
          envsubst < k8s/metabase/ingress.yaml         | kubectl apply -f -

      # ── Static manifests ─────────────────────────────────────────────────────
      - name: Apply static manifests
        run: |
          kubectl apply -f k8s/frontend/configmap.yaml
          kubectl apply -f k8s/backend/deployment.yaml
          kubectl apply -f k8s/backend/service.yaml
          kubectl apply -f k8s/frontend/deployment.yaml
          kubectl apply -f k8s/frontend/service.yaml
          kubectl apply -f k8s/metabase/pvc.yaml
          kubectl apply -f k8s/metabase/deployment.yaml
          kubectl apply -f k8s/metabase/service.yaml

      # ── Rolling update to new image SHA ──────────────────────────────────────
      - name: Roll out new images
        env:
          SHA_TAG: ${{ needs.build-and-push.outputs.sha_tag }}
        run: |
          kubectl set image deployment/backend  backend=${BACKEND_IMAGE}:${SHA_TAG}  -n erp
          kubectl set image deployment/frontend frontend=${FRONTEND_IMAGE}:${SHA_TAG} -n erp

          kubectl rollout status deployment/backend  -n erp --timeout=120s
          kubectl rollout status deployment/frontend -n erp --timeout=120s

          echo "Deployment complete"
          kubectl get pods -n erp
