name: Deploy Over SSH

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DEPLOY_PORT: ${{ vars.DEPLOY_SSH_PORT || '22' }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/emailservice' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          IFS=',' read -ra HOSTS <<< "${{ secrets.DEPLOY_SERVER_HOSTS }}"
          for host in "${HOSTS[@]}"; do
            host="$(echo "$host" | xargs)"
            [ -n "$host" ] || continue
            ssh-keyscan -p "${DEPLOY_PORT}" -H "$host" >> ~/.ssh/known_hosts
          done

          chmod 600 ~/.ssh/known_hosts

      - name: Deploy and Fix NiFi Properly
        shell: bash
        run: |
          set -euo pipefail

          IFS=',' read -ra HOSTS <<< "${{ secrets.DEPLOY_SERVER_HOSTS }}"
          for host in "${HOSTS[@]}"; do
            host="$(echo "$host" | xargs)"
            [ -n "$host" ] || continue

            echo "🚀 Deploying to ${host}"

            # Sync project
            rsync -az --delete \
              --exclude ".git/" \
              --exclude ".github/" \
              --exclude "backend/node_modules/" \
              --exclude "frontend/node_modules/" \
              --exclude "email-consumer/node_modules/" \
              --exclude "excel-service/" \
              --exclude "pdie/node_modules/" \
              --exclude "pdie/**/node_modules/" \
              --exclude "pdie/frontend/dist/" \
              --exclude "pdie/.env" \
              --exclude "frontend/.next/" \
              -e "ssh -p ${DEPLOY_PORT}" \
              ./ "${{ secrets.DEPLOY_SSH_USER }}@${host}:${DEPLOY_PATH}/"

            # Remote execution
            ssh -p "${DEPLOY_PORT}" "${{ secrets.DEPLOY_SSH_USER }}@${host}" "
              set -e
              cd '${DEPLOY_PATH}'

              echo '🧹 Stopping old containers...'
              docker compose down --remove-orphans || true
              docker compose -f pdie/docker-compose.yml down --remove-orphans || true
              docker rm -f emailservice-excel-backend emailservice-excel-worker emailservice-email-consumer || true

              echo '🧱 Rebuilding everything fresh...'
              docker compose up -d --build --force-recreate
              docker compose -f pdie/docker-compose.yml up -d --build --force-recreate

              echo '🌐 Testing PDIE backend health endpoint...'
              curl -sf http://localhost:4400/health || echo 'PDIE backend not responding yet'

              echo '✅ Deployment completed on ${host}'
            "
          done