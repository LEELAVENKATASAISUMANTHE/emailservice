name: PDIE — Clear Old Templates

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm clearing all templates from MongoDB'
        required: true
        default: ''
      also_clear_uploads:
        description: 'Also clear all uploads and logs? (yes/no)'
        required: false
        default: 'no'

jobs:
  clear-templates:
    runs-on: ubuntu-latest

    env:
      DEPLOY_PORT: ${{ vars.DEPLOY_SSH_PORT || '22' }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/emailservice' }}

    steps:
      - name: Validate confirmation
        if: ${{ github.event.inputs.confirm != 'yes' }}
        run: |
          echo "❌ You must type 'yes' to confirm. Aborting."
          exit 1

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          IFS=',' read -ra HOSTS <<< "${{ secrets.DEPLOY_SERVER_HOSTS }}"
          for host in "${HOSTS[@]}"; do
            host="$(echo "$host" | xargs)"
            [ -n "$host" ] || continue
            ssh-keyscan -p "${DEPLOY_PORT}" -H "$host" >> ~/.ssh/known_hosts
          done

          chmod 600 ~/.ssh/known_hosts

      - name: Clear MongoDB templates
        shell: bash
        run: |
          set -euo pipefail

          IFS=',' read -ra HOSTS <<< "${{ secrets.DEPLOY_SERVER_HOSTS }}"
          host="$(echo "${HOSTS[0]}" | xargs)"

          echo "🗑️  Clearing templates on ${host}..."

          CLEAR_UPLOADS="${{ github.event.inputs.also_clear_uploads }}"

          ssh -p "${DEPLOY_PORT}" "${{ secrets.DEPLOY_SSH_USER }}@${host}" "
            set -e

            echo '🔍 Finding MongoDB container...'
            MONGO_CONTAINER=\$(docker ps --format '{{.Names}}' | grep -i mongo | head -1)
            if [ -z \"\$MONGO_CONTAINER\" ]; then
              echo '❌ No MongoDB container found'
              exit 1
            fi
            echo \"📦 Using container: \$MONGO_CONTAINER\"

            echo ''
            echo '📊 Current counts:'
            docker exec \$MONGO_CONTAINER mongosh placement_erp --quiet --eval '
              print(\"  templates:       \" + db.templates.countDocuments());
              print(\"  uploads:         \" + db.uploads.countDocuments());
              print(\"  processing_logs: \" + db.processing_logs.countDocuments());
              print(\"  validation_logs: \" + db.validation_logs.countDocuments());
              print(\"  failed_chunks:   \" + db.failed_chunks.countDocuments());
            '

            echo ''
            echo '🗑️  Deleting all templates...'
            docker exec \$MONGO_CONTAINER mongosh placement_erp --quiet --eval '
              const result = db.templates.deleteMany({});
              print(\"Deleted \" + result.deletedCount + \" templates\");
            '

            if [ \"$CLEAR_UPLOADS\" = 'yes' ]; then
              echo '🗑️  Deleting all uploads, logs, and failed chunks...'
              docker exec \$MONGO_CONTAINER mongosh placement_erp --quiet --eval '
                let r;
                r = db.uploads.deleteMany({});
                print(\"Deleted \" + r.deletedCount + \" uploads\");
                r = db.processing_logs.deleteMany({});
                print(\"Deleted \" + r.deletedCount + \" processing_logs\");
                r = db.validation_logs.deleteMany({});
                print(\"Deleted \" + r.deletedCount + \" validation_logs\");
                r = db.failed_chunks.deleteMany({});
                print(\"Deleted \" + r.deletedCount + \" failed_chunks\");
              '
            fi

            echo ''
            echo '📊 Final counts:'
            docker exec \$MONGO_CONTAINER mongosh placement_erp --quiet --eval '
              print(\"  templates:       \" + db.templates.countDocuments());
              print(\"  uploads:         \" + db.uploads.countDocuments());
              print(\"  processing_logs: \" + db.processing_logs.countDocuments());
              print(\"  validation_logs: \" + db.validation_logs.countDocuments());
              print(\"  failed_chunks:   \" + db.failed_chunks.countDocuments());
            '

            echo ''
            echo '✅ Done! Generate new templates via POST /api/templates'
          "
