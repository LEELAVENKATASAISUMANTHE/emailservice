name: PDIE — Shutdown and Remove All Containers

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm full PDIE shutdown and container removal'
        required: true
        default: ''
      remove_volumes:
        description: 'Also delete all PDIE data volumes (MongoDB + MinIO data)? (yes/no)'
        required: false
        default: 'no'

jobs:
  shutdown-pdie:
    runs-on: ubuntu-latest

    env:
      DEPLOY_PORT: ${{ vars.DEPLOY_SSH_PORT || '22' }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/emailservice' }}

    steps:
      - name: Validate confirmation
        if: ${{ github.event.inputs.confirm != 'yes' }}
        run: |
          echo "You must type 'yes' to confirm. Aborting."
          exit 1

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          IFS=',' read -ra HOSTS <<< "${{ secrets.DEPLOY_SERVER_HOSTS }}"
          for host in "${HOSTS[@]}"; do
            host="$(echo "$host" | xargs)"
            [ -n "$host" ] || continue
            ssh-keyscan -p "${DEPLOY_PORT}" -H "$host" >> ~/.ssh/known_hosts
          done

          chmod 600 ~/.ssh/known_hosts

      - name: Shutdown and remove PDIE containers
        shell: bash
        run: |
          set -euo pipefail

          REMOVE_VOLUMES="${{ github.event.inputs.remove_volumes }}"

          IFS=',' read -ra HOSTS <<< "${{ secrets.DEPLOY_SERVER_HOSTS }}"
          for host in "${HOSTS[@]}"; do
            host="$(echo "$host" | xargs)"
            [ -n "$host" ] || continue

            echo "Connecting to ${host}..."

            ssh -p "${DEPLOY_PORT}" "${{ secrets.DEPLOY_SSH_USER }}@${host}" "
              set -e

              PDIE_COMPOSE='${DEPLOY_PATH}/pdie/docker-compose.yml'

              echo ''
              echo '=== Current PDIE container status ==='
              docker ps -a --filter 'name=pdie' --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' || true

              echo ''
              echo '=== Step 1: Stop via docker compose (graceful) ==='
              if [ -f \"\$PDIE_COMPOSE\" ]; then
                if [ \"$REMOVE_VOLUMES\" = 'yes' ]; then
                  BACKEND_HOST_PORT=5400 FRONTEND_HOST_PORT=5300 VITE_API_BASE_URL='' \
                    docker compose -f \"\$PDIE_COMPOSE\" down --remove-orphans --volumes || true
                else
                  BACKEND_HOST_PORT=5400 FRONTEND_HOST_PORT=5300 VITE_API_BASE_URL='' \
                    docker compose -f \"\$PDIE_COMPOSE\" down --remove-orphans || true
                fi
                echo 'docker compose down completed.'
              else
                echo 'pdie/docker-compose.yml not found — skipping compose down.'
              fi

              echo ''
              echo '=== Step 2: Force-kill known PDIE containers by name ==='
              for CNAME in pdie-frontend pdie-backend pdie-worker pdie-mongo pdie-minio pdie-redpanda; do
                if docker inspect \"\$CNAME\" >/dev/null 2>&1; then
                  docker rm -f \"\$CNAME\" && echo \"Removed: \$CNAME\" || echo \"Failed to remove: \$CNAME\"
                else
                  echo \"Not found (already gone): \$CNAME\"
                fi
              done

              echo ''
              echo '=== Step 3: Force-kill any remaining containers matching name=pdie ==='
              PDIE_CONTAINERS=\$(docker ps -aq --filter 'name=pdie' 2>/dev/null || true)
              if [ -n \"\$PDIE_CONTAINERS\" ]; then
                echo \"\$PDIE_CONTAINERS\" | xargs docker rm -f
                echo 'Removed remaining PDIE containers.'
              else
                echo 'No remaining PDIE containers found.'
              fi

              echo ''
              echo '=== Step 4: Remove PDIE Docker images ==='
              PDIE_IMAGES=\$(docker images --format '{{.Repository}}:{{.Tag}}' | grep -i 'pdie' || true)
              if [ -n \"\$PDIE_IMAGES\" ]; then
                echo \"\$PDIE_IMAGES\" | xargs docker rmi -f || true
                echo 'Removed PDIE images.'
              else
                echo 'No PDIE images found.'
              fi

              echo ''
              echo '=== Step 5: Remove PDIE Docker networks ==='
              PDIE_NETWORKS=\$(docker network ls --format '{{.Name}}' | grep -i 'pdie' || true)
              if [ -n \"\$PDIE_NETWORKS\" ]; then
                echo \"\$PDIE_NETWORKS\" | xargs docker network rm || true
                echo 'Removed PDIE networks.'
              else
                echo 'No PDIE networks found.'
              fi

              if [ \"$REMOVE_VOLUMES\" = 'yes' ]; then
                echo ''
                echo '=== Step 6: Remove PDIE Docker volumes ==='
                PDIE_VOLUMES=\$(docker volume ls --format '{{.Name}}' | grep -i 'pdie' || true)
                if [ -n \"\$PDIE_VOLUMES\" ]; then
                  echo \"\$PDIE_VOLUMES\" | xargs docker volume rm -f || true
                  echo 'Removed PDIE volumes (all data deleted).'
                else
                  echo 'No PDIE volumes found.'
                fi
              else
                echo ''
                echo '=== Step 6: Skipped volume removal (remove_volumes = no) ==='
              fi

              echo ''
              echo '=== Final verification ==='
              REMAINING=\$(docker ps -a --filter 'name=pdie' --format '{{.Names}}' || true)
              if [ -n \"\$REMAINING\" ]; then
                echo 'WARNING: The following PDIE containers are still present:'
                echo \"\$REMAINING\"
                exit 1
              else
                echo 'All PDIE containers successfully removed.'
              fi

              echo ''
              echo 'PDIE shutdown complete on ${host}.'
            "
          done
