services:
  mongo:
    image: mongo:7
    container_name: pdie-mongo
    restart: unless-stopped
    volumes:
      - pdie-mongo-data:/data/db

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: pdie-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - pdie-minio-data:/data

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.12
    container_name: pdie-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
      - --pandaproxy-addr=PLAINTEXT://0.0.0.0:8082
      - --advertise-pandaproxy-addr=PLAINTEXT://redpanda:8082

  pdie-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pdie-backend
    restart: unless-stopped
    depends_on:
      - mongo
      - minio
      - redpanda
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5300}
      PG_CONNECTION_STRING: ${PG_CONNECTION_STRING}
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/pdie}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      REDPANDA_BROKERS: ${REDPANDA_BROKERS:-redpanda:9092}
      REDPANDA_TOPIC: ${REDPANDA_TOPIC:-pdie.ingest}
      STARTUP_RETRY_ATTEMPTS: ${STARTUP_RETRY_ATTEMPTS:-30}
      STARTUP_RETRY_DELAY_MS: ${STARTUP_RETRY_DELAY_MS:-2000}
    ports:
      - '${BACKEND_HOST_PORT:-5400}:4000'

  pdie-worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: pdie-worker
    restart: unless-stopped
    depends_on:
      - mongo
      - minio
      - redpanda
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PG_CONNECTION_STRING: ${PG_CONNECTION_STRING}
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/pdie}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      REDPANDA_BROKERS: ${REDPANDA_BROKERS:-redpanda:9092}
      REDPANDA_TOPIC: ${REDPANDA_TOPIC:-pdie.ingest}
      REDPANDA_WORKER_CLIENT_ID: ${REDPANDA_WORKER_CLIENT_ID:-pdie-worker}
      REDPANDA_WORKER_GROUP_ID: ${REDPANDA_WORKER_GROUP_ID:-pdie-workers}
      STARTUP_RETRY_ATTEMPTS: ${STARTUP_RETRY_ATTEMPTS:-30}
      STARTUP_RETRY_DELAY_MS: ${STARTUP_RETRY_DELAY_MS:-2000}

  pdie-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5400}
    container_name: pdie-frontend
    restart: unless-stopped
    depends_on:
      - pdie-backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5400}
    ports:
      - '${FRONTEND_HOST_PORT:-5300}:80'

volumes:
  pdie-mongo-data:
  pdie-minio-data:
