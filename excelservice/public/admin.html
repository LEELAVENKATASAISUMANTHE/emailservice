<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Excel Service Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #07070f;
      --surface:  #0f0f1c;
      --surface2: #171728;
      --border:   rgba(255,255,255,0.07);
      --accent:   #6366f1;
      --green:    #22c55e;
      --red:      #ef4444;
      --yellow:   #f59e0b;
      --blue:     #3b82f6;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --radius:   12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Top bar ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(7,7,15,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 58px;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar h1 { font-size: 1rem; font-weight: 600; }
    .topbar h1 span { color: var(--accent); }
    .conn-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 99px; padding: 3px 10px; font-size: 0.72rem; color: var(--muted);
    }
    .conn-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); }
    .conn-dot.online { background: var(--green); box-shadow: 0 0 5px var(--green); }

    /* ── Global stats bar ── */
    .stats-bar {
      display: flex; gap: 0;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .stat-cell {
      flex: 1; padding: 14px 24px;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 2px;
    }
    .stat-cell:last-child { border-right: none; }
    .stat-val { font-size: 1.6rem; font-weight: 700; }
    .stat-lbl { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .c-green { color: var(--green); }
    .c-red   { color: var(--red);   }
    .c-blue  { color: var(--blue);  }
    .c-yellow { color: var(--yellow); }

    /* ── Main layout ── */
    .main { padding: 24px 32px; }
    .section-title {
      font-size: 0.78rem; text-transform: uppercase;
      letter-spacing: .08em; color: var(--muted); margin-bottom: 16px;
    }

    /* ── Session grid ── */
    #session-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    /* ── Session card ── */
    .session-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .25s, transform .2s;
      animation: cardIn .3s ease;
    }
    .session-card:hover { border-color: rgba(99,102,241,0.35); transform: translateY(-2px); }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .card-header .sid {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem; color: var(--accent); font-weight: 500;
    }
    .status-badge {
      padding: 2px 10px; border-radius: 99px;
      font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em;
    }
    .status-idle         { background: rgba(100,116,139,0.2); color: var(--muted); }
    .status-generating   { background: rgba(245,158,11,0.15); color: var(--yellow); }
    .status-template-ready { background: rgba(59,130,246,0.15); color: var(--blue); }
    .status-verified     { background: rgba(59,130,246,0.15); color: var(--blue); }
    .status-inserting    { background: rgba(99,102,241,0.15); color: var(--accent); }
    .status-complete     { background: rgba(34,197,94,0.15);  color: var(--green); }
    .status-error        { background: rgba(239,68,68,0.15);  color: var(--red); }
    .status-disconnected { background: rgba(100,116,139,0.15); color: var(--muted); }

    .card-body { padding: 14px 16px; }
    .card-tables { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
    .table-tag {
      padding: 2px 8px; border-radius: 6px; font-size: 0.72rem;
      background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.25);
      color: var(--accent);
    }
    .card-meta {
      display: flex; gap: 16px; font-size: 0.75rem; color: var(--muted);
      margin-bottom: 12px;
    }
    .card-meta span b { color: var(--text); }

    /* ── Progress bar ── */
    .prog-wrap { display: flex; align-items: center; gap: 8px; }
    .prog-bar {
      flex: 1; height: 5px; background: var(--surface2);
      border-radius: 99px; overflow: hidden;
    }
    .prog-fill {
      height: 100%; width: 0%; border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--green));
      transition: width .4s ease;
    }
    .prog-pct { font-size: 0.72rem; color: var(--muted); min-width: 32px; text-align: right; }

    /* ── Log toggle ── */
    .log-toggle {
      padding: 6px 16px; border-top: 1px solid var(--border);
      font-size: 0.75rem; color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      transition: background .15s;
    }
    .log-toggle:hover { background: var(--surface2); }
    .log-toggle .arrow { transition: transform .2s; }
    .log-toggle.open .arrow { transform: rotate(180deg); }

    /* ── Log stream ── */
    .log-stream {
      display: none; max-height: 200px; overflow-y: auto;
      background: #050509;
      font-family: 'JetBrains Mono', monospace; font-size: 0.72rem;
      padding: 10px 14px; line-height: 1.6;
      border-top: 1px solid var(--border);
    }
    .log-stream::-webkit-scrollbar { width: 3px; }
    .log-stream::-webkit-scrollbar-thumb { background: #1e1e30; }
    .log-stream.open { display: block; }
    .ls-line { display: flex; gap: 8px; animation: lsFade .15s ease; }
    @keyframes lsFade { from { opacity: 0; } to { opacity: 1; } }
    .ls-ts  { color: #334155; flex-shrink: 0; }
    .ls-evt { }
    .ls-evt.ok     { color: var(--green); }
    .ls-evt.err    { color: var(--red); }
    .ls-evt.info   { color: #94a3b8; }
    .ls-evt.finish { color: var(--yellow); font-weight: 600; }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1/-1; text-align: center;
      padding: 60px 20px; color: var(--muted); font-size: 0.9rem;
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

    /* ── Activity feed ── */
    #activity-feed {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; margin-top: 32px;
    }
    .feed-header {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      font-size: 0.8rem; font-weight: 600;
      display: flex; align-items: center; justify-content: space-between;
    }
    .feed-header button {
      font-size: 0.72rem; color: var(--muted); background: none;
      border: 1px solid var(--border); border-radius: 6px;
      padding: 2px 8px; cursor: pointer; font-family: inherit;
    }
    .feed-header button:hover { color: var(--text); border-color: var(--muted); }
    #feed-list {
      max-height: 220px; overflow-y: auto;
      font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
      padding: 10px 16px; display: flex; flex-direction: column; gap: 3px;
    }
    #feed-list::-webkit-scrollbar { width: 3px; }
    #feed-list::-webkit-scrollbar-thumb { background: #1e1e30; }
    .feed-line { display: flex; gap: 10px; color: #94a3b8; animation: lsFade .15s; }
    .feed-line .feed-sid { color: var(--accent); }
    .feed-line.ok   .feed-evt { color: var(--green); }
    .feed-line.err  .feed-evt { color: var(--red); }
    .feed-line.done .feed-evt { color: var(--yellow); }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <h1>⚡ Excel Service <span>Admin</span></h1>
      <div class="conn-badge">
        <div class="conn-dot" id="conn-dot"></div>
        <span id="conn-label">Connecting…</span>
      </div>
    </div>
    <div style="font-size:0.75rem;color:var(--muted)" id="clock"></div>
  </div>

  <div class="stats-bar">
    <div class="stat-cell">
      <div class="stat-val" id="gs-total">0</div>
      <div class="stat-lbl">Total Sessions</div>
    </div>
    <div class="stat-cell">
      <div class="stat-val c-blue" id="gs-active">0</div>
      <div class="stat-lbl">Active</div>
    </div>
    <div class="stat-cell">
      <div class="stat-val c-yellow" id="gs-inserting">0</div>
      <div class="stat-lbl">Inserting</div>
    </div>
    <div class="stat-cell">
      <div class="stat-val c-green" id="gs-complete">0</div>
      <div class="stat-lbl">Complete</div>
    </div>
    <div class="stat-cell">
      <div class="stat-val c-red" id="gs-errors">0</div>
      <div class="stat-lbl">Errors / Disc.</div>
    </div>
  </div>

  <div class="main">
    <div class="section-title">Active Sessions</div>
    <div id="session-grid">
      <div class="empty-state">
        <div class="icon">📡</div>
        <div>Waiting for sessions…</div>
        <div style="margin-top:6px;font-size:.78rem">Share the user portal link to get started.</div>
      </div>
    </div>

    <div id="activity-feed">
      <div class="feed-header">
        Global Activity Feed
        <button onclick="document.getElementById('feed-list').innerHTML=''">Clear</button>
      </div>
      <div id="feed-list"></div>
    </div>
  </div>

<script>
  const socket = io();
  const sessions = {};

  // ── Clock ──────────────────────────────────────────────────────────────
  setInterval(() => {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString();
  }, 1000);

  // ── Connection ──────────────────────────────────────────────────────────
  socket.on('connect', () => {
    document.getElementById('conn-dot').classList.add('online');
    document.getElementById('conn-label').textContent = 'Connected as Admin';
    socket.emit('join-admin');
  });
  socket.on('disconnect', () => {
    document.getElementById('conn-dot').classList.remove('online');
    document.getElementById('conn-label').textContent = 'Disconnected';
  });

  // ── Initial state snapshot ──────────────────────────────────────────────
  socket.on('admin-state', ({ sessions: list }) => {
    list.forEach(s => upsertSession(s));
    updateGlobalStats();
  });

  // ── Live session updates ────────────────────────────────────────────────
  socket.on('session-update', (s) => {
    upsertSession(s);
    updateGlobalStats();
  });

  // ── Log entries ─────────────────────────────────────────────────────────
  socket.on('log-entry', (entry) => {
    // Route to session card log
    const card = document.getElementById(`card-${entry.session}`);
    if (card) {
      const stream = card.querySelector('.log-stream');
      appendLogLine(stream, entry);
    }
    // Also add to global feed
    addFeedLine(entry);
  });

  socket.on('log-saved', ({ sessionId, objectName }) => {
    addFeedLine({ session: sessionId, event: 'log-saved', ts: new Date().toISOString(), objectName });
  });

  // ── Session card management ─────────────────────────────────────────────
  function upsertSession(s) {
    sessions[s.sessionId] = s;
    const existing = document.getElementById(`card-${s.sessionId}`);
    if (existing) {
      updateCard(existing, s);
    } else {
      createCard(s);
    }
  }

  function createCard(s) {
    const empty = document.querySelector('.empty-state');
    if (empty) empty.remove();

    const card = document.createElement('div');
    card.className = 'session-card';
    card.id = `card-${s.sessionId}`;
    card.innerHTML = cardHTML(s);

    // Log toggle
    card.querySelector('.log-toggle').addEventListener('click', function() {
      this.classList.toggle('open');
      const stream = card.querySelector('.log-stream');
      stream.classList.toggle('open');
    });

    document.getElementById('session-grid').appendChild(card);
  }

  function updateCard(card, s) {
    // Update badge
    const badge = card.querySelector('.status-badge');
    badge.className = `status-badge status-${s.status}`;
    badge.textContent = s.status.replace(/-/g,' ');

    // Update tables
    card.querySelector('.card-tables').innerHTML = (s.tables || [])
      .map(t => `<div class="table-tag">${t}</div>`).join('') || '<span style="color:var(--muted);font-size:.75rem">No tables selected</span>';

    // Update meta
    card.querySelector('.card-meta').innerHTML = metaHTML(s);

    // Update progress
    const { total=0, inserted=0, skipped=0 } = s.progress || {};
    const pct = total > 0 ? Math.round((inserted + skipped) / total * 100) : 0;
    const fill = card.querySelector('.prog-fill');
    if (fill) fill.style.width = pct + '%';
    const pctEl = card.querySelector('.prog-pct');
    if (pctEl) pctEl.textContent = `${inserted}✓ ${skipped}✗ / ${total}`;
  }

  function cardHTML(s) {
    const { total=0, inserted=0, skipped=0 } = s.progress || {};
    const pct = total > 0 ? Math.round((inserted + skipped) / total * 100) : 0;
    return `
      <div class="card-header">
        <div class="sid">${s.sessionId.slice(0,8)}<span style="color:var(--muted)">…</span></div>
        <div class="status-badge status-${s.status}">${s.status.replace(/-/g,' ')}</div>
      </div>
      <div class="card-body">
        <div class="card-tables">
          ${(s.tables||[]).map(t=>`<div class="table-tag">${t}</div>`).join('') || '<span style="color:var(--muted);font-size:.75rem">No tables selected</span>'}
        </div>
        <div class="card-meta">${metaHTML(s)}</div>
        <div class="prog-wrap">
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
          <div class="prog-pct">${inserted}✓ ${skipped}✗ / ${total}</div>
        </div>
      </div>
      <div class="log-toggle">
        <span>📋 Logs</span><span class="arrow">▼</span>
      </div>
      <div class="log-stream"></div>
    `;
  }

  function metaHTML(s) {
    const ago = s.lastActivity ? timeAgo(s.lastActivity) : '—';
    return `
      <span>Target: <b>${s.targetTable || '—'}</b></span>
      <span>Last active: <b>${ago}</b></span>
    `;
  }

  function appendLogLine(stream, entry) {
    const ts = new Date(entry.ts).toLocaleTimeString();
    const cls = classForEvent(entry.event);
    const line = document.createElement('div');
    line.className = 'ls-line';
    line.innerHTML = `<span class="ls-ts">${ts}</span><span class="ls-evt ${cls}">${formatEvent(entry)}</span>`;
    stream.appendChild(line);
    stream.scrollTop = stream.scrollHeight;
  }

  // ── Global activity feed ────────────────────────────────────────────────
  function addFeedLine(entry) {
    const feed = document.getElementById('feed-list');
    const ts = new Date(entry.ts).toLocaleTimeString();
    const cls = classForEvent(entry.event);
    const line = document.createElement('div');
    line.className = `feed-line ${cls === 'ok' ? 'ok' : cls === 'err' ? 'err' : cls === 'finish' ? 'done' : ''}`;
    line.innerHTML = `<span class="ls-ts">${ts}</span><span class="feed-sid">${entry.session?.slice(0,8)}</span><span class="feed-evt ${cls}">${formatEvent(entry)}</span>`;
    feed.appendChild(line);
    feed.scrollTop = feed.scrollHeight;

    // Cap at 200 lines
    while (feed.children.length > 200) feed.removeChild(feed.firstChild);
  }

  // ── Global stats ────────────────────────────────────────────────────────
  function updateGlobalStats() {
    const vals = Object.values(sessions);
    document.getElementById('gs-total').textContent = vals.length;
    document.getElementById('gs-active').textContent = vals.filter(s => !['complete','disconnected','error'].includes(s.status)).length;
    document.getElementById('gs-inserting').textContent = vals.filter(s => s.status === 'inserting').length;
    document.getElementById('gs-complete').textContent = vals.filter(s => s.status === 'complete').length;
    document.getElementById('gs-errors').textContent = vals.filter(s => ['error','disconnected'].includes(s.status)).length;
  }

  // ── Helpers ─────────────────────────────────────────────────────────────
  function classForEvent(event) {
    if (!event) return 'info';
    if (event.includes('inserted')) return 'ok';
    if (event.includes('error') || event.includes('Error')) return 'err';
    if (event.includes('complete')) return 'finish';
    return 'info';
  }

  function formatEvent(entry) {
    switch (entry.event) {
      case 'row-inserted':    return `✅ Row ${entry.rowNum} inserted`;
      case 'row-error':       return `❌ Row ${entry.rowNum} — ${(entry.errors||[]).join(', ')}`;
      case 'import-complete': return `🏁 Done — ${entry.inserted} inserted, ${entry.skipped} skipped`;
      case 'template-start':  return `⚙️ Generating template for [${(entry.tables||[]).join(', ')}]`;
      case 'template-generated': return `📄 Template ready: ${entry.filename}`;
      case 'file-verified':   return `🔍 File verified → ${entry.targetTable} (${entry.totalRows} rows)`;
      case 'insert-start':    return `🚀 Insert started → ${entry.table} (${entry.totalRows} rows)`;
      case 'log-saved':       return `📦 Log → ${entry.objectName}`;
      case 'session-start':   return `🟢 Session started`;
      default:                return entry.event + (entry.error ? ': ' + entry.error : '');
    }
  }

  function timeAgo(iso) {
    const secs = Math.round((Date.now() - new Date(iso)) / 1000);
    if (secs < 60)  return `${secs}s ago`;
    if (secs < 3600) return `${Math.floor(secs/60)}m ago`;
    return `${Math.floor(secs/3600)}h ago`;
  }
</script>
</body>
</html>
