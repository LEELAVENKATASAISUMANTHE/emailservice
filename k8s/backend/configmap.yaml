# Non-sensitive backend configuration.
# Verify infra service names with: kubectl get svc -n infra
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: rest
data:
  PORT: "4000"
  NODE_ENV: "production"
  # Comma-separated frontend origins — update to your actual domain
  ALLOWED_ORIGINS: "${ALLOWED_ORIGINS}"

  # MongoDB (infra namespace)
  MONGO_URI: "mongodb://mongodb.infra.svc.cluster.local:27017"
  MONGO_DB_NAME: "placement_erp"
  MONGO_IMPORTER_DB: "db_importer"

  # Redis (infra namespace)
  REDIS_URL: "redis://redis.infra.svc.cluster.local:6379"

  # Kafka / Redpanda (infra namespace)
  KAFKA_CLIENT_ID: "placement-rest-backend"
  KAFKA_BROKERS: "redpanda.infra.svc.cluster.local:9092"
  KAFKA_PENDING_TOPIC: "job.notification.pending"
  KAFKA_SEND_TOPIC: "job.notification.send"
  KAFKA_CONSUMER_GROUP: "placement-approval-group"
  KAFKA_EMAIL_CONSUMER_GROUP: "placement-email-consumer-group"

  # Email worker
  EMAIL_CONSUMER_ENABLED: "true"
  ZEPTOMAIL_API_URL: "https://api.zeptomail.in/v1.1/email"
  FROM_NAME: "Placement Cell"

  # Object storage (Cloudflare R2)
  OBJECT_STORAGE_USE_SSL: "true"
  OBJECT_STORAGE_AUTO_CREATE_BUCKET: "false"
  OBJECT_STORAGE_BUCKET: "placement-rest-assets"
