# Exposes the backend API externally at https://${BACKEND_DOMAIN}
# Replace host with your actual domain.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-ingress
  namespace: rest
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - ${BACKEND_DOMAIN}          # ← replace
      secretName: backend-tls
  rules:
    - host: ${BACKEND_DOMAIN}        # ← replace
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 4000
