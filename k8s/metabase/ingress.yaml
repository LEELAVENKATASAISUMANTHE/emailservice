# Exposes Metabase at https://${METABASE_DOMAIN}
# Replace host with your actual domain.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: metabase-ingress
  namespace: erp
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - ${METABASE_DOMAIN}     # ← replace
      secretName: metabase-tls
  rules:
    - host: ${METABASE_DOMAIN}   # ← replace
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: metabase
                port:
                  number: 3000
